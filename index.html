<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6feb" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>Troškovnik domaćinstva</title>
  </head>
  <body>
    <header class="app-header">
      <h1>Troškovnik domaćinstva</h1>
      <p class="subtitle">Prati prihode i troškove kroz mjesece.</p>
    </header>

    <main class="layout">
      <section class="card form-card">
        <h2>Novi unos</h2>
        <form id="entry-form">
          <label>
            Opis
            <input id="description" name="description" required maxlength="80" />
          </label>

          <label>
            Iznos (€)
            <input id="amount" name="amount" type="number" step="0.01" min="0.01" required />
          </label>

          <label>
            Tip
            <select id="type" name="type">
              <option value="expense">Trošak</option>
              <option value="income">Prihod</option>
            </select>
          </label>

          <label>
            Kategorija
            <select id="category" name="category">
              <option value="Hrana">Hrana</option>
              <option value="Stanovanje">Stanovanje</option>
              <option value="Režije">Režije</option>
              <option value="Prijevoz">Prijevoz</option>
              <option value="Zdravlje">Zdravlje</option>
              <option value="Zabava">Zabava</option>
              <option value="Ostalo">Ostalo</option>
            </select>
          </label>

          <label>
            Datum
            <input id="date" name="date" type="date" required />
          </label>

          <button type="submit">Dodaj unos</button>
        </form>
      </section>

      <section class="card summary-card">
        <h2>Sažetak</h2>
        <div class="summary-grid">
          <article>
            <h3>Prihodi</h3>
            <p id="total-income">0,00 €</p>
          </article>
          <article>
            <h3>Troškovi</h3>
            <p id="total-expense">0,00 €</p>
          </article>
          <article>
            <h3>Balans</h3>
            <p id="balance">0,00 €</p>
          </article>
        </div>
      </section>

      <section class="card filters-card">
        <h2>Filtriranje</h2>
        <label>
          Mjesec
          <input id="month-filter" type="month" />
        </label>
        <button id="clear-filter" type="button" class="ghost-btn">Očisti filter</button>
      </section>

      <section class="card list-card">
        <div class="list-header">
          <h2>Unosi</h2>
          <button id="clear-all" type="button" class="danger">Obriši sve</button>
        </div>
        <ul id="entries"></ul>
      </section>
    </main>

    <template id="entry-template">
      <li class="entry-item">
        <div>
          <strong class="entry-description"></strong>
          <p class="entry-meta"></p>
        </div>
        <div class="entry-actions">
          <span class="entry-amount"></span>
          <button type="button" class="delete-btn">Ukloni</button>
        </div>
      </li>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
